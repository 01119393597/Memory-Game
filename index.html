<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الذاكرة الاحترافية</title>
<style>
  :root {
    --bg1: #1e1b4b;
    --bg2: #4c1d95;
    --accent: #f472b6;
    --accent2: #22d3ee;
    --card-back: linear-gradient(135deg, #6366f1, #8b5cf6);
    --card-front: linear-gradient(135deg, #f0abfc, #67e8f9);
    --success: #34d399;
    --danger: #f87171;
    --text: #f5f3ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, var(--bg2), var(--bg1));
    color: var(--text);
    padding: 24px 16px 60px;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(24px, 5vw, 38px);
    margin-bottom: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
  }

  .subtitle {
    opacity: .7;
    margin-bottom: 24px;
    font-size: 14px;
    text-align: center;
  }

  /* ===== Splash ===== */
  .splash {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 24px;
    width: min(400px, 92vw);
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .splash input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
    margin: 16px 0;
    text-align: center;
    background: rgba(255,255,255,0.9);
    color: #1e1b4b;
  }

  .difficulty-group {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: .2s;
  }

  .diff-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1e1b4b;
    font-weight: bold;
    border-color: transparent;
  }

  .primary-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1e1b4b;
    transition: transform .15s;
  }
  .primary-btn:active { transform: scale(0.97); }

  /* ===== HUD ===== */
  .info-container {
    display: none;
    width: min(600px, 95vw);
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 12px 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .info-item { text-align: center; font-size: 13px; opacity: .85; }
  .info-item b { display: block; font-size: 18px; color: var(--accent2); }

  .restart-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1e1b4b;
    font-weight: bold;
    cursor: pointer;
    font-size: 13px;
  }

  /* ===== Board ===== */
  .memory-game-blocks {
    display: none;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: min(520px, 95vw);
  }

  .memory-game-blocks.show { display: grid; }

  .game-block {
    aspect-ratio: 1/1;
    perspective: 1000px;
    cursor: pointer;
  }

  .face {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 6vw, 34px);
    position: absolute;
    backface-visibility: hidden;
    transition: transform .5s;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  }

  .game-block .inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .5s;
  }

  .front {
    background: var(--card-back);
    transform: rotateY(0deg);
  }
  .front::after {
    content: "?";
    color: rgba(255,255,255,0.5);
    font-size: 26px;
  }

  .back {
    background: var(--card-front);
    transform: rotateY(180deg);
  }

  .game-block.is-flipped .inner,
  .game-block.has-match .inner {
    transform: rotateY(180deg);
  }

  .game-block.has-match .back {
    background: linear-gradient(135deg, var(--success), #10b981);
    animation: pop .4s ease;
  }

  .game-block.wrong .back,
  .game-block.wrong .front {
    animation: shake .4s ease;
  }

  @keyframes pop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0) rotateY(var(--r, 0deg)); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .no-clicking { pointer-events: none; }

  /* ===== Win Modal ===== */
  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .win-overlay.show { display: flex; }

  .win-card {
    background: linear-gradient(160deg, #312e81, #4c1d95);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    width: min(360px, 90vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .win-card h2 {
    font-size: 26px;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .win-stats {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
  }

  .win-stats div b { display: block; font-size: 20px; color: var(--accent2); }
  .win-stats div span { font-size: 12px; opacity: .7; }

  footer {
    margin-top: 30px;
    font-size: 12px;
    opacity: .5;
    text-align: center;
  }
</style>
</head>
<body>

  <h1>🧠 لعبة الذاكرة</h1>
  <p class="subtitle">قلّب الكروت ولاقي كل زوج متطابق قبل ما تخلص المحاولات!</p>

  <div class="splash" id="splash">
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">

    <div class="difficulty-group">
      <button class="diff-btn" data-pairs="6">سهل (6 أزواج)</button>
      <button class="diff-btn active" data-pairs="8">متوسط (8 أزواج)</button>
      <button class="diff-btn" data-pairs="10">صعب (10 أزواج)</button>
    </div>

    <button class="primary-btn" id="startBtn">ابدأ اللعب 🚀</button>
  </div>

  <div class="info-container" id="infoContainer">
    <div class="info-item">اللاعب<b id="playerName">-</b></div>
    <div class="info-item">الوقت<b id="timer">00:00</b></div>
    <div class="info-item">محاولات خطأ<b id="tries">0</b></div>
    <div class="info-item">أزواج متطابقة<b id="matched">0</b></div>
    <button class="restart-btn" id="restartBtn">إعادة تشغيل ↻</button>
  </div>

  <div class="memory-game-blocks" id="board"></div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <h2>🎉 مبروك!</h2>
      <p id="winMessage">خلصت اللعبة يا بطل</p>
      <div class="win-stats">
        <div><b id="finalTime">00:00</b><span>الوقت</span></div>
        <div><b id="finalTries">0</b><span>أخطاء</span></div>
      </div>
      <button class="primary-btn" id="playAgainBtn">العب تاني 🔁</button>
    </div>
  </div>

  <footer> Developed by Faisal Mahmoud </footer>

<script>
(() => {
  const ICONS = ["🐱","🐶","🦊","🐼","🦁","🐸","🦄","🐷","🐵","🐰","🐨","🐯","🦋","🐙"];

  const splash = document.getElementById('splash');
  const infoContainer = document.getElementById('infoContainer');
  const board = document.getElementById('board');
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');
  const winOverlay = document.getElementById('winOverlay');
  const playerNameEl = document.getElementById('playerName');
  const timerEl = document.getElementById('timer');
  const triesEl = document.getElementById('tries');
  const matchedEl = document.getElementById('matched');
  const finalTimeEl = document.getElementById('finalTime');
  const finalTriesEl = document.getElementById('finalTries');
  const winMessage = document.getElementById('winMessage');
  const diffButtons = document.querySelectorAll('.diff-btn');

  let selectedPairs = 8;
  let flippedBlocks = [];
  let matchedCount = 0;
  let totalPairs = 8;
  let wrongTries = 0;
  let timerInterval = null;
  let seconds = 0;
  let locked = false;
  let playerName = 'مجهول';

  diffButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      diffButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPairs = parseInt(btn.dataset.pairs);
    });
  });

  startBtn.addEventListener('click', () => {
    playerName = nameInput.value.trim() || 'مجهول';
    playerNameEl.textContent = playerName;
    splash.style.display = 'none';
    infoContainer.style.display = 'flex';
    startGame();
  });

  restartBtn.addEventListener('click', startGame);
  playAgainBtn.addEventListener('click', () => {
    winOverlay.classList.remove('show');
    startGame();
  });

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function formatTime(totalSeconds) {
    const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
    const s = String(totalSeconds % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function startTimer() {
    clearInterval(timerInterval);
    seconds = 0;
    timerEl.textContent = '00:00';
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = formatTime(seconds);
    }, 1000);
  }

  function startGame() {
    totalPairs = selectedPairs;
    matchedCount = 0;
    wrongTries = 0;
    flippedBlocks = [];
    locked = false;
    triesEl.textContent = '0';
    matchedEl.textContent = `0 / ${totalPairs}`;
    board.innerHTML = '';
    board.className = 'memory-game-blocks show';

    // adjust grid columns based on pair count for nicer layout
    const totalCards = totalPairs * 2;
    let cols = 4;
    if (totalCards <= 12) cols = 4;
    else if (totalCards <= 16) cols = 4;
    else cols = 5;
    board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    const chosenIcons = shuffle([...ICONS]).slice(0, totalPairs);
    const cardValues = shuffle([...chosenIcons, ...chosenIcons]);

    cardValues.forEach((icon) => {
      const card = document.createElement('div');
      card.className = 'game-block';
      card.dataset.icon = icon;
      card.innerHTML = `
        <div class="inner">
          <div class="face front"></div>
          <div class="face back">${icon}</div>
        </div>
      `;
      card.addEventListener('click', () => flipBlock(card));
      board.appendChild(card);
    });

    startTimer();
  }

  function flipBlock(card) {
    if (locked) return;
    if (card.classList.contains('is-flipped') || card.classList.contains('has-match')) return;

    card.classList.add('is-flipped');
    flippedBlocks.push(card);

    if (flippedBlocks.length === 2) {
      locked = true;
      board.classList.add('no-clicking');
      checkMatch(flippedBlocks[0], flippedBlocks[1]);
    }
  }

  function checkMatch(first, second) {
    const isMatch = first.dataset.icon === second.dataset.icon;

    if (isMatch) {
      setTimeout(() => {
        first.classList.remove('is-flipped');
        second.classList.remove('is-flipped');
        first.classList.add('has-match');
        second.classList.add('has-match');
        matchedCount++;
        matchedEl.textContent = `${matchedCount} / ${totalPairs}`;
        resetTurn();

        if (matchedCount === totalPairs) {
          endGame();
        }
      }, 400);
    } else {
      wrongTries++;
      triesEl.textContent = wrongTries;
      first.classList.add('wrong');
      second.classList.add('wrong');

      setTimeout(() => {
        first.classList.remove('is-flipped', 'wrong');
        second.classList.remove('is-flipped', 'wrong');
        resetTurn();
      }, 900);
    }
  }

  function resetTurn() {
    flippedBlocks = [];
    locked = false;
    board.classList.remove('no-clicking');
  }

  function endGame() {
    clearInterval(timerInterval);
    finalTimeEl.textContent = formatTime(seconds);
    finalTriesEl.textContent = wrongTries;
    winMessage.textContent = `برافو يا ${playerName}! خلصت اللعبة`;
    setTimeout(() => winOverlay.classList.add('show'), 500);
  }
})();
</script>

</body>
</html>
